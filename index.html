<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1a2744;--navy-dark:#0f1a30;--navy-mid:#2a3f66;--navy-light:#3d5a8a;
  --green-s:#d4edda;--green-st:#28a745;--green-bg:#edf7ef;--green-a:#1e7e34;
  --orange-s:#ffecd2;--orange-st:#f5920b;--orange-bg:#fff8ef;--orange-a:#d97706;
  --bg:#f5f7fa;--bg-w:#ffffff;--bg-card:#ffffff;--bg-surface:#fafbfd;
  --bg-input:#f0f2f6;--bg-hover:#eef1f6;--bg-elevated:#e8ecf2;
  --border:#dce1e8;--border-s:#e8ecf2;--border-f:#2d7ff9;
  --text-0:#1a2744;--text-1:#374a6a;--text-2:#6b7d99;--text-3:#9ba8bc;
  --blue:#2d7ff9;--blue-d:rgba(45,127,249,.08);--blue-glow:rgba(45,127,249,.15);
  --red:#e53e3e;--red-d:rgba(229,62,62,.08);
  --purple:#7c3aed;--purple-d:rgba(124,58,237,.08);
  --cyan:#0891b2;
  --r:10px;--r-sm:6px;--r-lg:14px;
  --shadow-sm:0 1px 3px rgba(26,39,68,.06),0 1px 2px rgba(26,39,68,.04);
  --shadow-md:0 4px 16px rgba(26,39,68,.08);--shadow-lg:0 12px 40px rgba(26,39,68,.12);
  --font:'Outfit',sans-serif;--mono:'IBM Plex Mono',monospace;
}
html{font-size:13.5px}
body{font-family:var(--font);background:var(--bg);color:var(--text-0);min-height:100vh;overflow-x:hidden}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 40%,var(--navy-mid) 100%);position:relative}
.login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 25% 40%,rgba(45,127,249,.12),transparent 50%),radial-gradient(ellipse at 75% 60%,rgba(13,202,115,.08),transparent 50%);pointer-events:none}
.login-box{width:420px;background:var(--bg-w);border-radius:var(--r-lg);padding:44px 38px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.25);z-index:1}
.login-box::before{content:'';position:absolute;top:0;left:24%;right:24%;height:3px;background:linear-gradient(90deg,var(--blue),var(--green-st),var(--orange-st));border-radius:0 0 4px 4px}
.login-logo{text-align:center;margin-bottom:30px}
.login-logo h1{font-size:1.5rem;font-weight:800;color:var(--navy);letter-spacing:-.5px}
.login-logo h1 span{color:var(--blue)}
.login-logo p{color:var(--text-2);font-size:.74rem;margin-top:4px}
.login-logo .co{font-size:.66rem;color:var(--text-3);margin-top:2px;font-family:var(--mono)}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:.7rem;font-weight:600;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.6px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text-0);font-family:var(--font);font-size:.88rem;transition:.2s}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-d);background:var(--bg-w)}
.fg input.field-error{border-color:var(--red);background:#fff8f8}
.fg input.field-error:focus{box-shadow:0 0 0 3px var(--red-d)}
.field-hint{font-size:.66rem;color:var(--red);margin-top:4px;display:none}
.field-hint.show{display:block}
.fg textarea{min-height:68px;resize:vertical}
.login-err{display:none;color:var(--red);font-size:.78rem;text-align:center;margin-bottom:10px;padding:8px;background:var(--red-d);border-radius:var(--r-sm)}
.btn-login{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--font);font-size:.92rem;font-weight:600;cursor:pointer;margin-top:6px;transition:.25s}
.btn-login:hover{background:var(--navy-mid);transform:translateY(-1px);box-shadow:0 6px 20px rgba(26,39,68,.25)}
.app{display:none;min-height:100vh}.app.active{display:flex}
.sidebar{width:255px;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar *{color:#fff}
.sidebar-hdr{padding:18px 18px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-hdr h2{font-size:.95rem;font-weight:700;display:flex;align-items:center;gap:10px}
.sidebar-hdr h2 .sh-logo{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:#fff;border-radius:7px;flex-shrink:0;overflow:hidden}

.role-pill{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:20px;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;background:rgba(255,255,255,.1)}
.sidebar-nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-sec{margin-bottom:4px}.nav-sec-t{font-size:.6rem;font-weight:600;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.8px;padding:8px 12px 3px}
.nav-i{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--r-sm);color:rgba(255,255,255,.6);cursor:pointer;transition:.15s;font-size:.84rem}
.nav-i:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.nav-i.active{background:rgba(45,127,249,.25);color:#fff;font-weight:500}
.nav-i .ic{width:17px;text-align:center;font-size:.82rem}
.nav-i .bdg{margin-left:auto;background:var(--red);color:#fff;font-size:.58rem;padding:2px 6px;border-radius:10px;font-weight:600}
.sidebar-ft{padding:12px 14px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-ft .uinfo{display:flex;align-items:center;gap:9px}
.sidebar-ft .uavatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem}
.sidebar-ft .uname{font-size:.82rem;font-weight:500}.sidebar-ft .urole{font-size:.66rem;color:rgba(255,255,255,.4)}
.btn-out{margin-top:8px;width:100%;padding:6px;background:transparent;border:1px solid rgba(255,255,255,.12);border-radius:var(--r-sm);color:rgba(255,255,255,.5);cursor:pointer;font-family:var(--font);font-size:.76rem;transition:.15s}
.btn-out:hover{background:rgba(229,62,62,.15);color:#fca5a5;border-color:rgba(229,62,62,.3)}
.session-timer{font-size:.58rem;color:rgba(255,255,255,.3);margin-top:4px;font-family:var(--mono)}
.main-c{margin-left:255px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg-w);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:50}
.topbar h3{font-size:1rem;font-weight:600;color:var(--navy)}
.notif-b{position:relative;width:34px;height:34px;border-radius:50%;background:var(--bg-input);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);transition:.15s;font-size:.85rem}
.notif-b:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-d)}
.notif-dot{position:absolute;top:4px;right:4px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--bg-w);display:none}
.notif-dot.has-unread{display:block}
.refresh-b{position:relative;width:34px;height:34px;border-radius:50%;background:var(--bg-input);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-2);transition:.15s;font-size:.85rem}
.refresh-b:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-d)}
.refresh-b.spinning{pointer-events:none;border-color:var(--blue);color:var(--blue)}
.refresh-b.spinning .rf-icon{animation:spin .8s linear infinite}
.refresh-b.success{border-color:var(--green-st);color:var(--green-st);background:var(--green-s)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sync-time{font-size:.62rem;color:var(--text-3);font-family:var(--mono);white-space:nowrap}
.page-c{padding:20px 24px;flex:1}
.notif-panel{display:none;position:fixed;top:52px;right:16px;width:360px;background:var(--bg-w);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-lg);z-index:200;max-height:65vh;overflow-y:auto}
.notif-panel.open{display:block}
.notif-hdr{padding:12px 16px;border-bottom:1px solid var(--border);font-size:.85rem;font-weight:600;color:var(--navy);display:flex;justify-content:space-between;align-items:center}
.notif-hdr .mark-read{font-size:.68rem;color:var(--blue);cursor:pointer;font-weight:500}
.notif-it{padding:10px 16px;border-bottom:1px solid var(--border-s);transition:.15s}.notif-it:hover{background:var(--bg-hover)}.notif-it.unread{border-left:3px solid var(--blue);background:var(--blue-d)}
.notif-it .nt{font-size:.8rem;font-weight:500}.notif-it .nd{font-size:.7rem;color:var(--text-2);margin-top:2px}.notif-it .nm{font-size:.62rem;color:var(--text-3);margin-top:3px}

/* ═══════════════ DASHBOARD v5.6 ═══════════════ */
.dash-top-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
.stat-card{background:var(--bg-w);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;position:relative;overflow:hidden;transition:.25s}
.stat-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.card-ho::before{background:linear-gradient(90deg,var(--navy),var(--blue))}.stat-card.card-rp::before{background:linear-gradient(90deg,var(--orange-st),#fbbf24)}.stat-card.card-lb::before{background:linear-gradient(90deg,var(--green-st),#6ee7b7)}
.stat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-top .st-label{font-size:.78rem;color:var(--text-2);font-weight:500}
.stat-top .st-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem}
.stat-total{font-size:2.4rem;font-weight:800;color:var(--navy);letter-spacing:-1.5px;line-height:1}
.stat-subs{display:flex;gap:0;margin-top:14px;border-top:1px solid var(--border-s);padding-top:12px}
.stat-sub{flex:1;text-align:center;position:relative}
.stat-sub+.stat-sub::before{content:'';position:absolute;left:0;top:2px;bottom:2px;width:1px;background:var(--border-s)}
.stat-sub .ss-val{font-size:1.15rem;font-weight:700;line-height:1}.stat-sub .ss-lbl{font-size:.6rem;color:var(--text-3);margin-top:3px;text-transform:uppercase;letter-spacing:.4px;font-weight:600}

/* Dashboard main grid: 2 columns */
.dash-main-grid{display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:18px}

/* Calendar section below main grid — FULL WIDTH */
.dash-cal-row{margin-bottom:18px}
.dash-bottom-row{display:grid;grid-template-columns:5fr 3fr;gap:16px}

.card{background:var(--bg-w);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-s)}
.card-h h4{font-size:.88rem;font-weight:600;color:var(--navy);display:flex;align-items:center;gap:7px}
.card-h .ch-sub{font-size:.68rem;color:var(--text-3);font-weight:400}.card-b{padding:14px 18px}
.appt-list{display:flex;flex-direction:column;gap:8px}
.appt{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg-surface);border-radius:var(--r-sm);border-left:3px solid transparent;transition:.15s}
.appt:hover{background:var(--bg-hover)}.appt.repair{border-left-color:var(--blue)}.appt.lbs{border-left-color:var(--orange-st)}.appt.urgent{border-left-color:var(--red)}
.appt-date{min-width:44px;text-align:center}.appt-date .ad-d{font-size:1.2rem;font-weight:700;color:var(--navy);line-height:1}.appt-date .ad-m{font-size:.6rem;color:var(--text-3);text-transform:uppercase;font-weight:500}
.appt-info{flex:1;min-width:0}.appt-info .ai-t{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.appt-info .ai-m{font-size:.68rem;color:var(--text-2);margin-top:1px}
.appt-tag{font-size:.62rem;padding:2px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.appt-tag.alert{background:var(--red-d);color:var(--red)}.appt-tag.soon{background:rgba(245,146,11,.1);color:var(--orange-a)}.appt-tag.normal{background:var(--bg-elevated);color:var(--text-3)}.appt-tag.progress{background:var(--blue-d);color:var(--blue)}
.budget-rows{display:flex;flex-direction:column;gap:10px}
.brow{display:flex;align-items:center;gap:10px}
.brow .bl{width:82px;font-size:.72rem;color:var(--text-2);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--mono);font-weight:500}
.brow .bt{flex:1;height:26px;background:var(--bg-input);border-radius:4px;position:relative;overflow:hidden}
.brow .bf{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:.65rem;font-weight:600;color:#fff;transition:width 1s cubic-bezier(.22,1,.36,1);white-space:nowrap}
.bf.c1{background:linear-gradient(90deg,var(--navy),var(--navy-mid))}.bf.c2{background:linear-gradient(90deg,var(--orange-st),#fbbf24)}.bf.c3{background:linear-gradient(90deg,var(--green-st),#34d399)}.bf.c4{background:linear-gradient(90deg,var(--blue),#60a5fa)}
.brow .bv{width:68px;font-size:.68rem;color:var(--text-2);font-family:var(--mono);text-align:right}
.rank-list{display:flex;flex-direction:column;gap:7px}
.rank-it{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--bg-surface);border-radius:var(--r-sm);transition:.15s}.rank-it:hover{background:var(--bg-hover)}
.rank-pos{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700}
.rank-pos.g1{background:#fef3c7;color:#b45309}.rank-pos.g2{background:#f1f5f9;color:#64748b}.rank-pos.g3{background:#fed7aa;color:#c2410c}.rank-pos.g0{background:var(--bg-input);color:var(--text-3)}
.rank-info{flex:1;min-width:0}.rank-info .rj{font-size:.78rem;font-weight:500;font-family:var(--mono)}.rank-info .rp{font-size:.68rem;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-cnt{font-size:1.05rem;font-weight:700;color:var(--red)}.rank-cnt span{font-size:.6rem;color:var(--text-3);font-weight:400;margin-left:2px}
.kpi-wrap{display:flex;align-items:center;gap:24px;padding:6px 0}
.kpi-donut{position:relative;width:110px;height:110px;flex-shrink:0}
.kpi-donut svg{transform:rotate(-90deg)}
.kpi-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.kpi-center .kv{font-size:1.5rem;font-weight:800;color:var(--navy);letter-spacing:-1px}.kpi-center .kt{font-size:.58rem;color:var(--text-3);text-transform:uppercase;font-weight:500}
.kpi-leg{display:flex;flex-direction:column;gap:10px}
.kpi-li{display:flex;align-items:center;gap:8px}.kpi-dot{width:10px;height:10px;border-radius:3px}.kpi-li .kl-v{font-size:.9rem;font-weight:600;min-width:20px}.kpi-li .kl-t{font-size:.72rem;color:var(--text-2)}
.team-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.tm-card{background:var(--bg-surface);border:1px solid var(--border-s);border-radius:var(--r-sm);padding:12px;text-align:center;transition:.2s}
.tm-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.tm-av{width:40px;height:40px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;position:relative}.tm-av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.tm-av .online-dot{position:absolute;bottom:0;right:0;width:10px;height:10px;border-radius:50%;border:2px solid var(--bg-surface)}.tm-av .online-dot.on{background:var(--green-st)}.tm-av .online-dot.off{background:var(--text-3)}
.tm-nm{font-size:.8rem;font-weight:600}.tm-pos{font-size:.65rem;color:var(--text-2);margin-top:1px}
.tm-status{font-size:.6rem;padding:2px 8px;border-radius:10px;font-weight:600;margin-top:6px;display:inline-block}
.tm-status.avail{background:var(--green-s);color:var(--green-a)}.tm-status.busy{background:var(--red-d);color:var(--red)}
.tm-task{font-size:.62rem;color:var(--text-3);margin-top:4px}

/* ═══════════════ CALENDAR (Dashboard inline) ═══════════════ */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.cal-nav .cn-btn{width:32px;height:32px;border-radius:50%;background:var(--bg-input);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;color:var(--text-2);transition:.15s}
.cal-nav .cn-btn:hover{background:var(--blue-d);border-color:var(--blue);color:var(--blue)}
.cal-nav .cn-title{font-size:.95rem;font-weight:600;color:var(--navy);min-width:160px;text-align:center}
.cal-nav .cn-today{font-size:.72rem;padding:4px 10px;background:var(--navy);color:#fff;border:none;border-radius:var(--r-sm);cursor:pointer;font-family:var(--font);font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dh{padding:7px 4px;text-align:center;font-size:.64rem;font-weight:600;color:var(--text-3);text-transform:uppercase}
.cal-d{min-height:68px;padding:5px 6px;background:var(--bg-w);border-radius:4px;border:1px solid var(--border-s);transition:.15s}
.cal-d:hover{border-color:var(--blue)}.cal-d.om{opacity:.25;background:var(--bg-surface)}
.cal-d .dn{font-size:.7rem;font-weight:500;color:var(--text-2);margin-bottom:3px}
.cal-d.has-ev{cursor:pointer}.cal-d.has-ev:hover{border-color:var(--blue);background:var(--blue-d);transform:scale(1.02);box-shadow:var(--shadow-sm)}
.cal-d.today{background:var(--blue-d);border-color:var(--blue)}.cal-d.today .dn{color:var(--blue);font-weight:700}
.cal-ev{font-size:.55rem;padding:2px 4px;border-radius:2px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.cal-ev.repair{background:rgba(45,127,249,.1);color:var(--blue)}.cal-ev.lbs{background:rgba(245,146,11,.1);color:var(--orange-a)}
.cal-legend{display:flex;gap:12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-s)}
.cal-leg-item{display:flex;align-items:center;gap:5px;font-size:.68rem;color:var(--text-2)}
.cal-leg-dot{width:10px;height:10px;border-radius:2px}

/* ═══════════════ TABLES & FORMS ═══════════════ */
.dtbl{width:100%;border-collapse:collapse}
.dtbl th{text-align:left;padding:9px 10px;font-size:.68rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--border);background:var(--bg-surface)}
.dtbl td{padding:9px 10px;font-size:.82rem;border-bottom:1px solid var(--border-s);color:var(--text-1)}.dtbl tr:hover td{background:var(--blue-d)}
.sts{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.68rem;font-weight:600}
.sts.submitted,.sts.pending{background:rgba(245,146,11,.1);color:var(--orange-a)}
.sts.approved,.sts.done,.sts.completed{background:var(--green-s);color:var(--green-a)}
.sts.in_progress,.sts.resubmitted,.sts.assigned{background:var(--blue-d);color:var(--blue)}
.sts.returned{background:var(--red-d);color:var(--red)}.sts.draft{background:var(--bg-elevated);color:var(--text-3)}
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:7px 11px;background:var(--bg-w);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text-0);font-family:var(--font);font-size:.8rem}
.btn{padding:8px 18px;border-radius:var(--r-sm);font-family:var(--font);font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid transparent;transition:.15s;display:inline-flex;align-items:center;gap:5px}
.btn-pri{background:var(--navy);color:#fff}.btn-pri:hover{background:var(--navy-mid)}
.btn-sec{background:var(--bg-w);color:var(--text-2);border-color:var(--border)}.btn-sec:hover{background:var(--bg-hover);color:var(--text-1)}
.btn-suc{background:var(--green-st);color:#fff}.btn-suc:hover{background:var(--green-a)}
.btn-dan{background:var(--red);color:#fff}.btn-dan:hover{background:#c53030}
.btn-war{background:var(--orange-st);color:#fff}.btn-war:hover{background:var(--orange-a)}
.btn-sm{padding:4px 10px;font-size:.72rem}
/* ── Approval Inbox / role UI ── */
.inbox-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.inbox-head h4{font-size:.95rem;font-weight:700;color:var(--navy)}
.inbox-head .ih-count{background:var(--navy);color:#fff;font-size:.7rem;font-weight:700;padding:2px 9px;border-radius:20px}
.inbox-grid{display:flex;flex-direction:column;gap:10px}
.inbox-card{display:flex;align-items:center;gap:14px;background:var(--bg-card);border:1px solid var(--border-s);border-left:4px solid var(--blue);border-radius:var(--r);padding:13px 16px;transition:.15s}
.inbox-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.inbox-card.k-lbs{border-left-color:var(--orange-st)}
.ic-type{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:6px;background:var(--blue-d);color:var(--blue);white-space:nowrap}
.ic-type.k-lbs{background:rgba(245,146,11,.1);color:var(--orange-a)}
.ic-main{flex:1;min-width:0}
.ic-job{font-family:var(--mono);font-weight:700;font-size:.82rem;color:var(--navy)}
.ic-proj{font-size:.8rem;color:var(--text-1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ic-meta{font-size:.68rem;color:var(--text-3);margin-top:2px}
.aging{font-size:.66rem;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}
.aging.fresh{background:var(--green-bg);color:var(--green-a)}
.aging.warn{background:rgba(245,146,11,.12);color:var(--orange-a)}
.aging.late{background:var(--red-d);color:var(--red)}
.ic-acts{display:flex;gap:6px;flex-shrink:0}
.empty-state{text-align:center;padding:48px 20px}
.empty-state .es-emo{font-size:2.6rem;margin-bottom:8px}
.empty-state .es-txt{font-size:.92rem;font-weight:600;color:var(--text-2)}
.empty-state .es-sub{font-size:.76rem;margin-top:4px;color:var(--text-3)}
.stepper{display:flex;align-items:center;margin:4px 0 18px;padding:14px 8px;background:var(--bg-surface);border:1px solid var(--border-s);border-radius:var(--r)}
.stepper.returned{background:var(--red-d);border-color:rgba(229,62,62,.2)}
.step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;font-size:.66rem;color:var(--text-3)}
.step .sdot{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;background:var(--bg-elevated);color:var(--text-3);border:2px solid var(--border);z-index:1}
.step.done .sdot{background:var(--green-st);color:#fff;border-color:var(--green-st)}
.step.active .sdot{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-d)}
.step.done .slbl,.step.active .slbl{color:var(--text-1);font-weight:600}
.step .slbl{margin-top:6px;text-align:center}
.step::before{content:'';position:absolute;top:13px;left:-50%;width:100%;height:2px;background:var(--border)}
.step:first-child::before{display:none}
.step.done::before,.step.active::before{background:var(--green-st)}
.step-ret-tag{margin-left:10px;font-size:.66rem;font-weight:700;color:var(--red);white-space:nowrap}
.rtn-reasons{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.rtn-chip{padding:6px 12px;border:1px solid var(--border);background:var(--bg-w);border-radius:20px;font-family:var(--font);font-size:.76rem;color:var(--text-1);cursor:pointer;transition:.15s}
.rtn-chip:hover{border-color:var(--red);color:var(--red);background:var(--red-d)}
.rtn-ta{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:var(--r-sm);font-family:var(--font);font-size:.84rem;color:var(--text-0);resize:vertical}
.rtn-ta:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-d)}
.step.returned .sdot{background:var(--red);color:#fff;border-color:var(--red)}
.step.returned .slbl{color:var(--red);font-weight:700}
.step.returned::before{background:var(--red)}
.sdate{font-size:.56rem;color:var(--text-3);margin-top:3px;font-family:var(--mono)}
.att-chip{display:inline-block;font-size:.62rem;font-weight:600;padding:1px 7px;border-radius:12px;margin-left:6px}
.att-chip.has{background:var(--blue-d);color:var(--blue)}
.att-chip.none{background:var(--bg-elevated);color:var(--text-3)}
.btn-complete{background:linear-gradient(135deg,#059669,#10b981);color:#fff}.btn-complete:hover{background:#047857}
.btn-report{background:linear-gradient(135deg,#7c3aed,#9f67fa);color:#fff}.btn-report:hover{background:#6d28d9}
.btn-pdf{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff}
.btn-pdf:hover{background:var(--navy-light)}
.fcard{max-width:820px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}.frow.full{grid-template-columns:1fr}.frow.three{grid-template-columns:1fr 1fr 1fr}
.factions{display:flex;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border-s)}
.req-badge{display:inline-block;font-size:.58rem;color:var(--red);font-weight:600;margin-left:4px;vertical-align:middle}
.form-section-title{font-size:.72rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border-s)}

/* ═══════════════ MODAL ═══════════════ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,26,48,.5);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.modal-overlay.open{display:flex}
.modal{background:var(--bg-w);border-radius:var(--r-lg);width:95%;max-width:760px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg-w);z-index:2}
.modal-h h3{font-size:1rem;font-weight:700;color:var(--navy)}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--bg-input);border:none;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-2);transition:.15s}.modal-close:hover{background:var(--red-d);color:var(--red)}
.modal-b{padding:20px 24px}
.modal-f{padding:14px 24px;border-top:1px solid var(--border-s);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;position:sticky;bottom:0;background:var(--bg-w)}

/* Detail View */
.detail-section-title{font-size:.7rem;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border-s)}
.detail-section-title:first-child{margin-top:0}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{padding:10px 12px;background:var(--bg-surface);border-radius:var(--r-sm);border:1px solid var(--border-s)}
.detail-item .di-l{font-size:.62rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:3px}
.detail-item .di-v{font-size:.86rem;color:var(--text-0);font-weight:500;word-break:break-word}
.detail-full{grid-column:1/-1}
.detail-attach{background:var(--bg-surface);border:1px solid var(--border-s);border-radius:var(--r-sm);padding:12px 14px}
.detail-attach .da-label{font-size:.62rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:8px}
.attach-link{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:var(--blue-d);border:1px solid rgba(45,127,249,.2);border-radius:var(--r-sm);color:var(--blue);font-size:.78rem;font-weight:500;text-decoration:none;transition:.15s}
.attach-link:hover{background:rgba(45,127,249,.15);border-color:var(--blue)}
.attach-none{font-size:.78rem;color:var(--text-3);font-style:italic}
.detail-comment{background:#fff8f0;border:1px solid rgba(245,146,11,.25);border-radius:var(--r-sm);padding:10px 12px;border-left:3px solid var(--orange-st)}
.detail-comment .dc-label{font-size:.62rem;color:var(--orange-a);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:4px}
.detail-comment .dc-text{font-size:.82rem;color:var(--text-0)}
.detail-return-comment{background:var(--red-d);border:1px solid rgba(229,62,62,.2);border-radius:var(--r-sm);padding:10px 12px;border-left:3px solid var(--red)}
.detail-return-comment .dc-label{font-size:.62rem;color:var(--red);text-transform:uppercase;letter-spacing:.4px;font-weight:700;margin-bottom:4px}
.checklist-view{list-style:none;padding:0}
.checklist-view li{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.82rem;color:var(--text-1);border-bottom:1px solid var(--border-s)}
.checklist-view li:last-child{border-bottom:none}
.chk-icon{width:18px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0}
.chk-icon.yes{background:var(--green-s);color:var(--green-a)}.chk-icon.no{background:var(--bg-elevated);color:var(--text-3)}

/* Other existing styles */
.stabs{display:inline-flex;flex-wrap:wrap;max-width:100%;gap:5px;background:var(--navy);border:1px solid var(--navy-dark);border-radius:var(--r);padding:5px;margin-bottom:18px}
.stab{padding:9px 18px;font-size:.84rem;font-weight:500;color:rgba(255,255,255,.6);cursor:pointer;border-radius:var(--r-sm);transition:.15s;white-space:nowrap}
.stab:hover{color:#fff;background:rgba(255,255,255,.1)}.stab.active{color:#1a2026;background:var(--orange-s);font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.stab-panel{display:none}.stab-panel.active{display:block}
.log-row{display:flex;gap:10px;padding:8px 12px;font-size:.78rem;border-bottom:1px solid var(--border-s)}.log-row:hover{background:var(--bg-hover)}
.log-time{width:130px;color:var(--text-3);font-family:var(--mono);font-size:.72rem}.log-act{flex:1;color:var(--text-1)}.log-usr{width:80px;color:var(--text-2);font-weight:500}
.pw-wrap{position:relative}.pw-wrap input{padding-right:36px}
.pw-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);font-size:.82rem}
.rst-chk{display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer;padding:6px 10px;border-radius:var(--r-sm);transition:.15s}
.rst-chk:hover{background:var(--bg-hover)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--r-sm);padding:16px;text-align:center;cursor:pointer;transition:.2s;background:var(--bg-surface)}
.upload-zone:hover{border-color:var(--blue);background:var(--blue-d)}
.upload-zone .uz-icon{font-size:1.5rem;margin-bottom:6px}.upload-zone .uz-text{font-size:.78rem;color:var(--text-2)}.upload-zone .uz-sub{font-size:.66rem;color:var(--text-3);margin-top:3px}
.upload-preview{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.upload-preview .up-item{position:relative;width:72px;height:72px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border-s)}
.upload-preview .up-item img{width:100%;height:100%;object-fit:cover}
.upload-preview .up-item .up-rm{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(229,62,62,.9);color:#fff;border:none;font-size:.6rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sig-pad-wrap{border:2px solid var(--border);border-radius:var(--r-sm);background:#fff;position:relative;overflow:hidden;user-select:none}
.sig-pad-wrap canvas{display:block;touch-action:none;cursor:crosshair;width:100%}
.sig-pad-label{font-size:.64rem;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.sig-pad-actions{display:flex;gap:6px;margin-top:5px}
.sig-clear-btn{padding:3px 10px;font-size:.7rem;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r-sm);cursor:pointer;color:var(--text-2);font-family:var(--font);transition:.15s}
.sig-clear-btn:hover{background:var(--red-d);color:var(--red);border-color:rgba(229,62,62,.3)}
.sig-placeholder{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:.68rem;color:var(--text-3);pointer-events:none}
.req-chk-group{margin-bottom:14px;padding:14px 16px;background:var(--bg-surface);border:1px solid var(--border-s);border-radius:var(--r-sm)}
.req-chk-group .rcg-title{font-size:.7rem;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.req-chk{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:.84rem;cursor:pointer}
.req-chk input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
.req-chk.checked{color:var(--green-st);font-weight:500}

var curRole='',curUser='',curPage='dashboard',calYear=0,calMonth=0,dashCalYear=0,dashCalMonth=0;
var sessionToken='',sessionExpiry=null,sessionTimerInterval=null;
(function(){var n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();dashCalYear=n.getFullYear();dashCalMonth=n.getMonth();})();

/* ═══════════════════════════════════════════════════════
   ⚙️  SUPABASE CONFIG  — paste your project values here
   (จาก Supabase Dashboard → Project Settings → API)
═══════════════════════════════════════════════════════ */
var SUPABASE_URL      = 'https://yqmvlsdzppygsrtrctjz.supabase.co'; // โปรเจกต์ของคุณ (เติมให้แล้ว)
var SUPABASE_ANON_KEY = 'YOUR_PUBLIC_ANON_KEY';                   // <-- แก้ตรงนี้
var API_URL = SUPABASE_URL + '/functions/v1/api';

/* ═══════════════════════════════════════════════════════
   SUPABASE BRIDGE  (drop-in replacement for the old GAS bridge)
   - คงชื่อ gsr() และ shape เดิมทุกประการ จึงไม่ต้องแก้ call site อื่นเลย
   - ทุก action ถูกเรียกผ่าน Edge Function เดียว (service-role อยู่ฝั่ง server)
═══════════════════════════════════════════════════════ */
function gsr(fn){
  var args = Array.prototype.slice.call(arguments, 1);
  return fetch(API_URL, {
    method : 'POST',
    headers: {
      'Content-Type' : 'application/json',
      'apikey'       : SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
    },
    body: JSON.stringify({ fn: fn, args: args, token: sessionToken || '' })
  }).then(function(res){
    return res.json().catch(function(){ return { __error: 'HTTP ' + res.status }; });
  }).then(function(j){
    if (j && j.__error) throw new Error(j.__error);
    return j;
  });
}
function showLoading(msg){var el=document.getElementById('loadingOverlay');if(el){document.getElementById('loadingText').textContent=msg||'Loading...';el.style.display='flex';}}
function hideLoading(){var el=document.getElementById('loadingOverlay');if(el)el.style.display='none';}

/* ═══════════════════════════════════════════════════════
   DATE & FORMAT HELPERS
═══════════════════════════════════════════════════════ */
function parseISO(s){if(!s)return '';var str=String(s).trim();if(/^\d{4}-\d{2}-\d{2}/.test(str))return str.slice(0,10);var m=str.match(/^(\d{2})[-\/](\d{2})[-\/](\d{4})/);if(m)return m[3]+'-'+m[2]+'-'+m[1];return str;}
function fmtDate(s){var iso=parseISO(s);if(!iso||iso.length<10)return s||'\u2014';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtTHB(n){return '&#3647;'+Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtTHBShort(n){var v=Number(n||0);if(v>=1e6)return '&#3647;'+(v/1e6).toFixed(1)+'M';if(v>=1e3)return '&#3647;'+(v/1e3).toFixed(0)+'K';return '&#3647;'+v;}
function stsCls(s){return String(s||'').toLowerCase().replace(/-/g,'_');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ═══════════════════════════════════════════════════════
   SESSION
═══════════════════════════════════════════════════════ */
function saveSession(token,user,role,expiresInHours){sessionToken=token;curUser=user;curRole=role;sessionExpiry=new Date(Date.now()+expiresInHours*3600000);try{sessionStorage.setItem('sms_token',token);sessionStorage.setItem('sms_user',user);sessionStorage.setItem('sms_role',role);sessionStorage.setItem('sms_expiry',sessionExpiry.toISOString());}catch(e){}startSessionTimer();}
function clearSession(){sessionToken='';curUser='';curRole='';sessionExpiry=null;if(sessionTimerInterval){clearInterval(sessionTimerInterval);sessionTimerInterval=null;}try{sessionStorage.removeItem('sms_token');sessionStorage.removeItem('sms_user');sessionStorage.removeItem('sms_role');sessionStorage.removeItem('sms_expiry');}catch(e){}}
function restoreSession(){try{var t=sessionStorage.getItem('sms_token'),u=sessionStorage.getItem('sms_user'),r=sessionStorage.getItem('sms_role'),e=sessionStorage.getItem('sms_expiry');if(t&&u&&r&&e){var exp=new Date(e);if(exp>new Date()){sessionToken=t;curUser=u;curRole=r;sessionExpiry=exp;return true;}}}catch(ex){}return false;}
function startSessionTimer(){if(sessionTimerInterval)clearInterval(sessionTimerInterval);sessionTimerInterval=setInterval(function(){var el=document.getElementById('sessionTimer');if(!sessionExpiry){if(el)el.textContent='';return;}var rem=sessionExpiry-Date.now();if(rem<=0){clearInterval(sessionTimerInterval);doLogout();alert('Session expired. Please login again.');return;}var mins=Math.floor(rem/60000),hrs=Math.floor(mins/60);mins=mins%60;if(el)el.textContent='Session: '+hrs+'h '+String(mins).padStart(2,'0')+'m';if(rem<600000&&rem>598000&&el)el.style.color='#fca5a5';},2000);}
function checkSessionValid(){if(!sessionExpiry)return false;return new Date()<sessionExpiry;}

/* ═══════════════════════════════════════════════════════
   DATA LOADING
═══════════════════════════════════════════════════════ */
async function loadAllData(){showLoading('Loading data...');try{var results=await Promise.all([gsr('serverGetAll','Handovers'),gsr('serverGetAll','LBSWorks'),gsr('serverGetAll','ServiceOrders'),gsr('serverGetAll','ServiceReports'),gsr('serverGetAll','Team'),gsr('serverGetAll','ActivityLogs'),gsr('serverGetAll','Notifications'),gsr('serverGetAll','Letters'),gsr('serverGetAll','Checkins')]);DB.handovers=results[0]||[];DB.lbsWorks=results[1]||[];DB.serviceOrders=results[2]||[];DB.serviceReports=results[3]||[];DB.team=results[4]||[];DB.activityLogs=results[5]||[];DB.notifications=(results[6]||[]).slice(0,20);DB.letters=results[7]||[];DB.checkins=results[8]||[];updateNotifDot();}catch(e){console.error('Load error:',e)}hideLoading();}
var lastSyncTime=null;

var attachedFiles=[];
function handleFileAttach(input,listId){
  var files=input.files;
  for(var i=0;i<files.length;i++){
    (function(f){
      if(f.size>10*1024*1024){alert('ไฟล์ใหญ่เกิน 10MB: '+f.name);return;}
      var ext=f.name.split('.').pop().toLowerCase();
      var icon=ext==='pdf'?'📄':(ext==='doc'||ext==='docx')?'📝':(ext==='xls'||ext==='xlsx')?'📊':'📎';
      var reader=new FileReader();
      reader.onload=function(e){
        var b64=e.target.result.split(',')[1];
        var idx=attachedFiles.length;
        attachedFiles.push({name:f.name,size:f.size,icon:icon,b64:b64,mime:f.type||'application/octet-stream'});
        var zone=document.getElementById(listId);
        if(zone){
          var div=document.createElement('div');
          div.className='file-attach-item';div.id='fa_'+idx;
          div.innerHTML='<span>'+icon+'</span><span>'+esc(f.name)+' <span style="color:var(--text-3);font-size:.65rem">('+Math.round(f.size/1024)+'KB)</span></span><button class="fa-rm" onclick="removeFileAttach('+idx+')">✕</button>';
          zone.appendChild(div);
        }
      };
      reader.readAsDataURL(f);
    })(files[i]);
  }
  input.value='';
}
function removeFileAttach(idx){attachedFiles[idx]=null;var el=document.getElementById('fa_'+idx);if(el)el.remove();}
function uploadAttachmentsFor(sheet,id){
  var files=(attachedFiles||[]).filter(Boolean);
  if(!files.length)return Promise.resolve();
  return files.reduce(function(p,f){
    return p.then(function(){
      return gsr('serverUploadAttachment', f.name, f.b64, f.mime, sheet, id)
        .catch(function(){ /* keep going even if one file fails */ });
    });
  },Promise.resolve());
}
function attachListHtml(rec){
  var html='';
  if(rec.attachments&&String(rec.attachments).length>5){
    html+='<a href="'+esc(rec.attachments)+'" target="_blank" class="attach-link" style="margin:3px 6px 3px 0">🔗 ลิ้งค์ข้อมูลโครงการ ↗</a>';
  }
  var files=rec.attachment_files?String(rec.attachment_files).split('||').filter(Boolean):[];
  files.forEach(function(item){
    var parts=item.split('::');var name=parts[0]||'file';var url=parts[1]||'';
    var ext=name.split('.').pop().toLowerCase();
    var icon=ext==='pdf'?'📄':(ext==='doc'||ext==='docx')?'📝':(ext==='xls'||ext==='xlsx')?'📊':'📎';
    html+='<a href="'+esc(url)+'" target="_blank" class="attach-link" style="margin:3px 6px 3px 0">'+icon+' '+esc(name)+' ↗</a>';
  });
  return html||'<span class="attach-none">— ไม่มีไฟล์แนบ —</span>';
}

var mapTrackInstance=null;
function projectTH(lat,lng){var latN=20.7,latS=5.5,lngW=97.3,lngE=105.7;return {x:Math.max(2,Math.min(98,(lng-lngW)/(lngE-lngW)*100)),y:Math.max(2,Math.min(98,(latN-lat)/(latN-latS)*100))};}
function mapFallback(pts){
  var pins=pts.map(function(c){var p=projectTH(c.lat,c.lng);return '<div title="'+esc((c.kind==='LBS'?'⚡ ':'🔧 ')+(c.ref_no||'')+' '+(c.label||''))+'" style="position:absolute;left:'+p.x+'%;top:'+p.y+'%;transform:translate(-50%,-100%);font-size:20px;line-height:1">📍</div>';}).join('');
  return '<div style="position:relative;height:100%;min-height:360px;background:linear-gradient(180deg,#eaf3ff,#f3f8ff)">'
    +'<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#c2d3e8;font-weight:800;font-size:1.3rem;letter-spacing:1px">🇹🇭 ประเทศไทย</div>'

    +'</div>';
}
function initMapTracking(){
  var el=document.getElementById('mapTrack');if(!el)return;
  var pts=(DB.checkins||[]).filter(function(c){return typeof c.lat==='number'&&typeof c.lng==='number'});
  if(window.L){
    try{
      if(mapTrackInstance){try{mapTrackInstance.remove();}catch(e){}mapTrackInstance=null;}
      var map=L.map(el).setView([13.0,101.0],5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
      mapTrackInstance=map;var bounds=[];
      pts.forEach(function(c){var mk=L.marker([c.lat,c.lng]).addTo(map);mk.bindPopup('<b>'+(c.kind==='LBS'?'⚡ LBS & Support':'🔧 Service Report')+'</b><br>'+esc(c.ref_no||'')+(c.label?'<br>'+esc(c.label):'')+'<br><span style="color:#888;font-size:11px">'+esc(c.who||'')+' · '+esc(c.created_at?String(c.created_at).slice(0,16).replace('T',' '):'')+'</span>');bounds.push([c.lat,c.lng]);});
      if(bounds.length)map.fitBounds(bounds,{padding:[40,40],maxZoom:12});
      setTimeout(function(){try{map.invalidateSize();}catch(e){}},150);
    }catch(e){el.innerHTML=mapFallback(pts);}
  }else{el.innerHTML=mapFallback(pts);}
}

function buildDashCal(){
  var yr=dashCalYear,mo=dashCalMonth;
  var mNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var dNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate(),pdim=new Date(yr,mo,0).getDate();
  var now=new Date(),todayStr=now.toISOString().slice(0,10);
  var events=[];
  DB.serviceOrders.filter(function(s){return s.status!=='DONE'}).forEach(function(so){var team=Array.isArray(so.assigned_team)?so.assigned_team:[];var ho=DB.handovers.find(function(h){return h.job_no===so.ref_job_no});team.forEach(function(tid){events.push({start:parseISO(so.planned_start),end:parseISO(so.planned_finish),label:so.so_no+' '+getTeamName(tid),type:'repair',job:so.so_no,desc:so.description,project:ho?ho.project_name:'',teamName:getTeamName(tid)});});});
  DB.lbsWorks.filter(function(l){return l.status==='ASSIGNED'}).forEach(function(lb){var team=Array.isArray(lb.assigned_team)?lb.assigned_team:[];team.forEach(function(tid){events.push({start:parseISO(lb.planned_start),end:parseISO(lb.planned_end),label:lb.job_no+' '+getTeamName(tid),type:'lbs',job:lb.job_no,desc:lb.project_name,project:lb.project_name,teamName:getTeamName(tid)});});});
  var grid='<div class="cal-grid">';
  dNames.forEach(function(d){grid+='<div class="cal-dh">'+d+'</div>';});
  for(var i=0;i<fd;i++){grid+='<div class="cal-d om"><div class="dn">'+(pdim-fd+i+1)+'</div></div>';}
  for(var d=1;d<=dim;d++){var ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');var isToday=ds===todayStr;var dayEv=events.filter(function(e){return ds>=e.start&&ds<=e.end});var hasEv=dayEv.length>0;grid+='<div class="cal-d '+(isToday?'today':'')+' '+(hasEv?'has-ev':'')+'" '+(hasEv?'onclick="showDashDayEvents(\''+ds+'\')" style="cursor:pointer"':'')+'>'+' <div class="dn">'+d+(hasEv?'<span style="display:inline-block;margin-left:3px;background:var(--blue);color:#fff;font-size:.5rem;padding:0 3px;border-radius:8px;font-weight:700;vertical-align:middle">'+dayEv.length+'</span>':'')+'</div>';dayEv.slice(0,2).forEach(function(e){grid+='<div class="cal-ev '+e.type+'"><span class="ce-job">'+esc(e.job||e.so_no||'')+'</span><span class="ce-asg">'+esc(e.teamName||'')+'</span></div>';});if(dayEv.length>2)grid+='<div style="font-size:.55rem;color:var(--text-3)">+'+(dayEv.length-2)+' more</div>';grid+='</div>';}
  var rem=(fd+dim)%7;if(rem>0)for(var j=1;j<=7-rem;j++){grid+='<div class="cal-d om"><div class="dn">'+j+'</div></div>';}
  grid+='</div><div class="cal-legend"><div class="cal-leg-item"><div class="cal-leg-dot" style="background:rgba(45,127,249,.3)"></div> Repair / Service Order</div><div class="cal-leg-item"><div class="cal-leg-dot" style="background:rgba(245,146,11,.3)"></div> LBS Work</div></div>';
  return {monthLabel:mNames[mo]+' '+yr,grid:grid};
}

function showDashDayEvents(dateStr){
  var evs=[];
  DB.serviceOrders.filter(function(s){return s.status!=='DONE'}).forEach(function(so){var st=parseISO(so.planned_start),en=parseISO(so.planned_finish);if(dateStr>=st&&dateStr<=en){var names=Array.isArray(so.assigned_team)?so.assigned_team.map(function(id){return getTeamName(id)}).join(', '):'Unassigned';evs.push({type:'repair',no:so.so_no,title:so.description,team:names,start:st,end:en,status:so.status});}});
  DB.lbsWorks.filter(function(l){return l.status==='ASSIGNED'}).forEach(function(lb){var st=parseISO(lb.planned_start),en=parseISO(lb.planned_end);if(dateStr>=st&&dateStr<=en){var names=Array.isArray(lb.assigned_team)?lb.assigned_team.filter(Boolean).map(function(id){return getTeamName(id)}).join(', '):'—';evs.push({type:'lbs',no:lb.job_no,title:lb.project_name,team:names,start:st,end:en,status:lb.status});}});
  var body=evs.length?evs.map(function(e){return '<div style="padding:12px;background:var(--bg-surface);border-radius:var(--r-sm);border-left:3px solid '+(e.type==='repair'?'var(--blue)':'var(--orange-st)')+';margin-bottom:8px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span class="sts '+stsCls(e.status)+'">'+e.status+'</span><span style="font-family:var(--mono);font-size:.78rem;font-weight:600">'+esc(e.no)+'</span></div><div style="font-size:.85rem;font-weight:500">'+esc(e.title)+'</div><div style="font-size:.72rem;color:var(--text-2);margin-top:3px">Team: '+esc(e.team)+'</div><div style="font-size:.68rem;color:var(--text-3);margin-top:3px">'+fmtDate(e.start)+' → '+fmtDate(e.end)+'</div></div>';}).join(''):'<p style="color:var(--text-3);text-align:center;padding:20px">No events on this day</p>';
  openModal('Events — '+fmtDate(dateStr),body,'<button class="btn btn-sec" onclick="closeModal()">Close</button>');
}

function validateField(id, required){
  var el=document.getElementById(id);
  if(!el)return true;
  var val=el.value.trim();
  var ok=!required||val.length>0;
  el.classList.toggle('field-error',!ok);
  var hint=el.parentNode.querySelector('.field-hint');
  if(hint)hint.classList.toggle('show',!ok);
  return ok;
}

  var job=document.getElementById('f_ho_job').value.trim(),name=document.getElementById('f_ho_name').value.trim();

function submitLBS(){
  var job=document.getElementById('f_lb_job').value.trim(),name=document.getElementById('f_lb_name').value.trim();
  var contact=document.getElementById('f_lb_contact').value.trim();
  var phone=document.getElementById('f_lb_phone').value.trim();

  if(!job||!name){alert('กรุณากรอก Job No. และ Project Name');return;}
  var ok=true;
  if(!contact){validateField('f_lb_contact',true);ok=false;}
  if(!phone){validateField('f_lb_phone',true);ok=false;}
  if(!email){validateField('f_lb_email',true);ok=false;}
  if(!ok){alert('กรุณากรอก Contact Person, Phone และ Email ให้ครบถ้วน');return;}

function daysSince(s){var iso=parseISO(s);if(!iso||iso.length<10)return 0;var d=new Date(iso+'T00:00:00');var diff=Math.floor((new Date()-d)/86400000);return diff<0?0:diff;}
function attachCount(rec){var n=0;if(rec.attachment_files)n+=String(rec.attachment_files).split('||').map(function(s){return s.trim()}).filter(Boolean).length;if(rec.attachments&&String(rec.attachments).trim())n+=1;return n;}
function agingPill(days){var cls=days>=4?'late':(days>=2?'warn':'fresh');var lbl=days===0?'วันนี้':days+' วัน';return '<span class="aging '+cls+'">⏱ '+lbl+'</span>';}

function findLogDate(id,kw){

function stepDate(rec,which){
  if(!rec)return '';
  if(which==='submit')return fmtDate(rec.created_at);
  if(which==='approve')return findLogDate(rec.id,'Approved');
  if(which==='assign')return findLogDate(rec.id,'Assigned');
  if(which==='complete')return findLogDate(rec.id,'Completed');
  return '';
}
var STEP_FLOWS={
  Handover:[{k:'SUBMITTED',l:'ส่งเข้า',w:'submit'},{k:'APPROVED',l:'อนุมัติ',w:'approve'},{k:'COMPLETED',l:'เสร็จสิ้น',w:'complete'}],
  LBS:[{k:'SUBMITTED',l:'ส่งเข้า',w:'submit'},{k:'APPROVED',l:'อนุมัติ',w:'approve'},{k:'ASSIGNED',l:'มอบหมาย',w:'assign'},{k:'COMPLETED',l:'เสร็จสิ้น',w:'complete'}],
  SO:[{k:'PENDING',l:'รอดำเนินการ',w:'submit'},{k:'IN_PROGRESS',l:'กำลังซ่อม',w:'assign'},{k:'DONE',l:'เสร็จสิ้น',w:'complete'}],
  SR:[{k:'IN_PROGRESS',l:'กำลังดำเนินการ',w:'submit'},{k:'DONE',l:'เสร็จสิ้น',w:'complete'}]
};
function statusStepper(kind,status,rec){
  var flow=STEP_FLOWS[kind]||STEP_FLOWS.Handover;
  var st=String(status||'').toUpperCase();
  var returned=st==='RETURNED';
  var norm=st==='RESUBMITTED'?'SUBMITTED':st;
  var order=flow.map(function(s){return s.k;});
  var cur=order.indexOf(norm);if(cur<0)cur=0;
  var steps=flow.map(function(s,i){
    var cls,mark;
    if(returned){
      if(i===0){cls='done';mark='✓';}
      else if(i===1){cls='returned';mark='↩';}
      else{cls='';mark=i+1;}
    }else{
      cls=i<cur?'done':(i===cur?'active':'');
      mark=i<cur?'✓':(i+1);
    }
    var dt=stepDate(rec,s.w);
    return '<div class="step '+cls+'"><div class="sdot">'+mark+'</div><div class="slbl">'+s.l+'</div>'+(dt?'<div class="sdate">'+esc(dt)+'</div>':'')+'</div>';
  }).join('');
  var retTag=returned?'<span class="step-ret-tag">↩️ ส่งกลับให้แก้ไข</span>':'';
  return '<div class="stepper'+(returned?' returned':'')+'">'+steps+retTag+'</div>';
}

function renderServiceReports(){return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div class="filter-bar" style="margin-bottom:0"><input placeholder="🔍 Search..." style="width:200px" oninput="filterTable(this,\'srTbl\')"></div><button class="btn btn-pri" onclick="openNewSR()">+ New S.R.</button></div><div class="card"><div class="card-b" style="overflow-x:auto"><table class="dtbl" id="srTbl"><thead><tr><th>S.R. No.</th><th>Ref S.O.</th><th>Type</th><th>Items</th><th>Cost</th><th>Status</th><th>Actions</th></tr></thead><tbody>'+DB.serviceReports.map(function(sr){return '<tr><td style="font-family:var(--mono);font-size:.78rem;cursor:pointer;color:var(--blue)" onclick="showSRDetail(\''+sr.id+'\')">'+esc(sr.sr_no)+'</td><td style="font-family:var(--mono);font-size:.78rem">'+esc(sr.ref_so)+'</td><td>'+esc(sr.damaged_type)+'</td><td>'+esc(sr.damaged_items)+'</td><td style="font-family:var(--mono)">'+fmtTHBShort(sr.cost_total)+'</td><td><span class="sts '+stsCls(sr.status)+'">'+sr.status+'</span></td><td>'+(sr.status==='IN_PROGRESS'?'<button class="btn btn-suc btn-sm" onclick="openCompleteSR(\''+sr.id+'\')">✅ Complete</button> ':'')+'<button class="btn btn-pdf btn-sm" onclick="generatePDF(\'ServiceReport\',\''+sr.id+'\')">📄</button>'+(curRole==='manager'?' <button class="btn btn-dan btn-sm" onclick="deleteRecord(\'ServiceReports\',\''+sr.id+'\')">🗑</button>':'')+'</td></tr>'}).join('')+'</tbody></table></div></div>';}

function jobProgress(start,end){var now=new Date().toISOString().slice(0,10);if(end&&now>end)return '<span class="sts returned">OVERDUE</span>';if(start&&now>=start)return '<span class="sts in_progress">IN_PROGRESS</span>';return '<span class="sts submitted">SCHEDULED</span>';}
function renderTeamManagement(){
  var teamCards=DB.team.map(function(t){var ini=t.name.split(' ').map(function(n){return n[0]}).join('');var soTasks=DB.serviceOrders.filter(function(so){return Array.isArray(so.assigned_team)&&so.assigned_team.includes(t.psp_id)&&so.status!=='DONE'});var lbsTasks=DB.lbsWorks.filter(function(l){return Array.isArray(l.assigned_team)&&l.assigned_team.includes(t.psp_id)&&l.status==='ASSIGNED'});var allTasks=soTasks.map(function(s){return{no:s.so_no,type:'repair'}}).concat(lbsTasks.map(function(l){return{no:l.job_no,type:'lbs'}}));var busy=allTasks.length>0;return '<div class="tm-card">'+teamAv(t)+'<div class="tm-nm">'+esc(t.name)+'</div><div class="tm-pos">'+esc(t.position)+'</div><div style="font-size:.65rem;color:var(--text-3);margin-top:2px">'+esc(t.psp_id)+'</div><button class="tm-photo-btn" onclick="openTeamPhoto(\''+t.psp_id+'\')">📷 รูป</button>'+(curRole==='manager'?'<button class="tm-photo-btn" onclick="openEditTeam(\''+t.psp_id+'\')">✏️</button> <button class="tm-photo-btn" style="border-color:#fb7185;color:#e53e3e" onclick="deleteRecord(\'Team\',\''+t.psp_id+'\')">🗑</button>':'')+'<div class="tm-status '+(busy?'busy':'avail')+'">'+(busy?'Assigned ('+allTasks.length+')':'Available')+'</div>'+(busy?'<div class="tm-task">'+allTasks.map(function(tk){return '<span style="display:inline-block;padding:1px 5px;background:'+(tk.type==='repair'?'var(--blue-d)':'rgba(245,146,11,.1)')+';color:'+(tk.type==='repair'?'var(--blue)':'var(--orange-a)')+';border-radius:3px;font-size:.58rem;font-weight:600;margin:1px 2px">'+esc(tk.no)+'</span>'}).join('')+'</div>':'')+'</div>';}).join('');
  // per-person work schedule (Service & Scheduling)
  var sched=DB.team.map(function(t){
    var jobs=[];
    DB.serviceOrders.filter(function(so){return Array.isArray(so.assigned_team)&&so.assigned_team.indexOf(t.psp_id)>-1&&so.status!=='DONE'}).forEach(function(so){var ho=DB.handovers.find(function(h){return h.job_no===so.ref_job_no});jobs.push({no:so.so_no,type:'repair',title:so.description||(ho?ho.project_name:''),start:parseISO(so.planned_start),end:parseISO(so.planned_finish)});});
    DB.lbsWorks.filter(function(l){return Array.isArray(l.assigned_team)&&l.assigned_team.indexOf(t.psp_id)>-1&&l.status==='ASSIGNED'}).forEach(function(l){jobs.push({no:l.job_no,type:'lbs',title:l.project_name,start:parseISO(l.planned_start),end:parseISO(l.planned_end)});});
    jobs.sort(function(a,b){return (a.start||'').localeCompare(b.start||'')});
    return {t:t,jobs:jobs};
  });
  var schedHtml=sched.map(function(m){
    var rows=m.jobs.length?m.jobs.map(function(j){return '<tr><td style="font-family:var(--mono);font-size:.76rem">'+esc(j.no)+'</td><td><span class="sts '+(j.type==='repair'?'in_progress':'assigned')+'" style="font-size:.58rem">'+(j.type==='repair'?'REPAIR':'LBS')+'</span></td><td style="font-size:.8rem">'+esc(j.title||'—')+'</td><td style="font-size:.72rem;color:var(--text-2);white-space:nowrap">'+fmtDate(j.start)+' → '+fmtDate(j.end)+'</td><td>'+jobProgress(j.start,j.end)+'</td></tr>';}).join('')
      :'<tr><td colspan="5" style="text-align:center;color:var(--text-3);font-size:.78rem;padding:10px">— ว่าง / Available —</td></tr>';
    return '<div class="card" style="margin-bottom:12px"><div class="card-h" style="gap:10px">'+teamAv(m.t)+'<div style="flex:1"><h4 style="margin:0">'+esc(m.t.name)+'</h4><div style="font-size:.64rem;color:var(--text-3)">'+esc(m.t.position||'')+' · '+esc(m.t.psp_id)+'</div></div><span class="ch-sub">'+m.jobs.length+' งาน</span></div><div class="card-b" style="overflow-x:auto"><table class="dtbl" style="width:100%"><thead><tr><th>Job No.</th><th>Type</th><th>Title</th><th>Schedule</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }).join('');
  return '<div style="display:flex;gap:10px;margin-bottom:14px"><button class="btn btn-pri" onclick="assignRepair()">🔧 Assign Repair</button><button class="btn btn-war" onclick="assignLBS()">⚡ Assign LBS</button><button class="btn btn-suc" onclick="openAddTeamMember()">+ Add Member</button></div>'
    +'<div class="card" style="margin-bottom:16px"><div class="card-h"><h4>📋 Service &amp; Scheduling (รายบุคคล)</h4><span class="ch-sub">'+DB.team.length+' คน</span></div><div class="card-b">'+(schedHtml||'<div class="empty-state" style="padding:22px"><div class="es-sub">— ยังไม่มีทีมงาน —</div></div>')+'</div></div>'
    +'<div class="card"><div class="card-h"><h4>👥 Team Members</h4></div><div class="card-b"><div class="team-strip">'+teamCards+'</div></div></div>';
}
function assignRepair(){var pending=DB.serviceOrders.filter(function(s){return s.status==='PENDING'}),active=DB.team.filter(function(t){return t.active});if(!pending.length){alert('No pending Service Orders');return;}var body='<div class="fg"><label>Service Order</label><select id="ar_so">'+pending.map(function(s){return '<option value="'+s.id+'">'+esc(s.so_no)+' — '+esc(s.description)+'</option>'}).join('')+'</select></div><div class="fg"><label>Team Members</label>'+active.map(function(t){return '<label class="rst-chk"><input type="checkbox" value="'+t.psp_id+'" class="ar-chk"><span>'+esc(t.name)+'</span></label>'}).join('')+'</div>';openModal('Assign Repair Team',body,'<button class="btn btn-pri" onclick="doAssignRepair()">Assign</button><button class="btn btn-sec" onclick="closeModal()">Cancel</button>');}
function doAssignRepair(){var soId=document.getElementById('ar_so').value;var team=Array.from(document.querySelectorAll('.ar-chk:checked')).map(function(c){return c.value});if(!team.length){alert('Select at least one member');return;}showLoading('Assigning...');gsr('serverAssignTeam',soId,team,curUser).then(function(){return loadAllData()}).then(function(){hideLoading();closeModal();navigateTo('team-management')}).catch(function(e){hideLoading();alert('Error: '+e)});}
function assignLBS(){var approved=DB.lbsWorks.filter(function(l){return l.status==='APPROVED'}),active=DB.team.filter(function(t){return t.active});if(!approved.length){alert('No approved LBS works');return;}var body='<div class="fg"><label>LBS Work</label><select id="al_lbs">'+approved.map(function(l){return '<option value="'+l.id+'">'+esc(l.job_no)+' — '+esc(l.project_name)+'</option>'}).join('')+'</select></div><div class="fg"><label>Team Members</label>'+active.map(function(t){return '<label class="rst-chk"><input type="checkbox" value="'+t.psp_id+'" class="al-chk"><span>'+esc(t.name)+'</span></label>'}).join('')+'</div><div class="frow"><div class="fg"><label>Start</label><input type="date" id="al_start"></div><div class="fg"><label>End</label><input type="date" id="al_end"></div></div>';openModal('Assign LBS Team',body,'<button class="btn btn-war" onclick="doAssignLBS()">Assign</button><button class="btn btn-sec" onclick="closeModal()">Cancel</button>');}
function doAssignLBS(){var lbsId=document.getElementById('al_lbs').value;var team=Array.from(document.querySelectorAll('.al-chk:checked')).map(function(c){return c.value});if(!team.length){alert('Select at least one member');return;}showLoading('Assigning...');gsr('serverAssignLBS',lbsId,team,document.getElementById('al_start').value||'',document.getElementById('al_end').value||'',curUser).then(function(){return loadAllData()}).then(function(){hideLoading();closeModal();navigateTo('team-management')}).catch(function(e){hideLoading();alert('Error: '+e)});}
function openEditTeam(pspId){var t=DB.team.find(function(x){return x.psp_id===pspId});if(!t)return;var body='<div class="frow"><div class="fg"><label>PSP ID</label><input value="'+esc(t.psp_id)+'" readonly style="background:var(--bg-elevated);font-family:var(--mono)"></div><div class="fg"><label>ชื่อ-สกุล</label><input id="et_name" value="'+esc(t.name||'')+'"></div></div><div class="frow"><div class="fg"><label>ตำแหน่ง</label><input id="et_pos" value="'+esc(t.position||'')+'"></div><div class="fg"><label>เบอร์โทร</label><input id="et_phone" value="'+esc(t.phone||'')+'"></div></div><div class="frow"><div class="fg"><label>สีประจำตัว</label><input type="color" id="et_color" value="'+(t.color||'#2d7ff9')+'" style="height:42px;padding:4px"></div><div class="fg"><label>สถานะ</label><select id="et_active"><option value="true" '+(t.active?'selected':'')+'>Active (พร้อมใช้งาน)</option><option value="false" '+(!t.active?'selected':'')+'>Inactive (ปิดใช้งาน)</option></select></div></div>';openModal('✏️ แก้ไขสมาชิกทีม — '+esc(t.psp_id),body,'<button class="btn btn-pri" onclick="saveEditTeam(\''+pspId+'\')">บันทึก</button><button class="btn btn-sec" onclick="closeModal()">ยกเลิก</button>');}
function saveEditTeam(pspId){var data={name:document.getElementById('et_name').value.trim(),position:document.getElementById('et_pos').value.trim(),phone:document.getElementById('et_phone').value.trim(),color:document.getElementById('et_color').value,active:document.getElementById('et_active').value==='true'};if(!data.name){alert('กรุณากรอกชื่อ');return;}showLoading('Saving...');gsr('serverUpdateRecord','Team',pspId,data,curUser).then(function(r){if(r.success){return loadAllData().then(function(){hideLoading();closeModal();navigateTo('team-management');alert('✅ บันทึกแล้ว')})}else{hideLoading();alert(r.error||'Error');}}).catch(function(e){hideLoading();alert('Error: '+e)});}
var teamPhotoTmp=null;function handleTeamPhoto(input){var f=input.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(e){teamPhotoTmp={name:f.name,b64:e.target.result.split(',')[1],mime:f.type||'image/jpeg'};var pv=document.getElementById('atm_photo_pv');if(pv)pv.innerHTML='<img src="'+e.target.result+'" style="width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--border)">';};rd.readAsDataURL(f);}function openTeamPhoto(pspId){var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.onchange=function(){var f=inp.files[0];if(!f)return;var rd=new FileReader();rd.onload=function(e){showLoading('Uploading...');gsr('serverSetTeamPhoto',pspId,f.name,e.target.result.split(',')[1],f.type||'image/jpeg',curUser).then(function(){return loadAllData()}).then(function(){hideLoading();navigateTo('team-management')}).catch(function(err){hideLoading();alert('Error: '+err)});};rd.readAsDataURL(f);};inp.click();}function openAddTeamMember(){teamPhotoTmp=null;var body='<div class="frow"><div class="fg"><label>PSP ID</label><input id="atm_id" placeholder="PSP-007"></div><div class="fg"><label>Full Name</label><input id="atm_name" placeholder="Full name"></div></div><div class="frow"><div class="fg"><label>Position</label><input id="atm_pos" placeholder="e.g. Senior Technician"></div><div class="fg"><label>Phone</label><input id="atm_phone" placeholder="08x-xxx-xxxx"></div></div><div class="fg" style="margin-top:6px"><label>รูปถ่าย (ถ้ามี)</label><div><button class="btn-attach" onclick="document.getElementById(\'atm_photo\').click()">📷 เลือกรูป</button></div><input type="file" id="atm_photo" accept="image/*" capture="user" style="display:none" onchange="handleTeamPhoto(this)"><div id="atm_photo_pv" style="margin-top:8px"></div></div>';openModal('Add Team Member',body,'<button class="btn btn-suc" onclick="submitNewTeamMember()">Add</button><button class="btn btn-sec" onclick="closeModal()">Cancel</button>');}
function submitNewTeamMember(){var data={psp_id:document.getElementById('atm_id').value.trim(),name:document.getElementById('atm_name').value.trim(),position:document.getElementById('atm_pos').value,phone:document.getElementById('atm_phone').value.trim()};data.photo=teamPhotoTmp;if(!data.psp_id||!data.name){alert('PSP ID and Name required');return;}showLoading('Adding...');gsr('serverAddTeamMember',data,curUser).then(function(r){if(r.success){return loadAllData().then(function(){hideLoading();closeModal();navigateTo('team-management')})}else{hideLoading();alert(r.error||'Error');}}).catch(function(e){hideLoading();alert('Error: '+e)});}

function openPrintWindow(){

    var clean=msg.replace(/^[\u2705\u274c\u26a0\ufe0f\u2139\s]+/,'').trim(); if(!clean) clean=msg;
    var el=document.createElement('div'); el.className='toast t-'+type;
    el.innerHTML='<span class="t-ic"></span><span class="t-msg"></span><button class="t-x" aria-label="close">\u00d7</button>';
    el.querySelector('.t-ic').textContent=ic(type);
    el.querySelector('.t-msg').textContent=clean;
    wrap.appendChild(el);
    requestAnimationFrame(function(){el.classList.add('show');});
    var to=setTimeout(close, ms||(type==='error'?5200:3300));
    function close(){clearTimeout(to);el.classList.remove('show');el.classList.add('hide');setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},340);}
    el.querySelector('.t-x').addEventListener('click',function(e){e.stopPropagation();close();});
    el.addEventListener('click',close);
    return el;
  };
  var _alert=window.alert.bind(window);
  window.alert=function(m){ try{ window.toast(m); }catch(e){ _alert(m); } };
})();
</script>
</body>
</html>
